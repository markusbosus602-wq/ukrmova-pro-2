<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Адмін-панель — UkrMova PRO Bot</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    background: linear-gradient(135deg, #0a0f0a 0%, #0a2a0a 100%);
    color: #0f0;
    font-family: 'Courier New', 'Fira Code', monospace;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 20px;
  }
  
  h1 {
    color: #0f0;
    text-shadow: 0 0 15px #0f0, 0 0 5px #0f0;
    text-align: center;
    font-size: 32px;
    margin-bottom: 20px;
    letter-spacing: 3px;
  }
  
  h2, h3 {
    color: #0f0;
    border-bottom: 2px solid #0f0;
    padding-bottom: 8px;
    margin: 20px 0 15px 0;
    text-shadow: 0 0 5px #0f0;
  }
  
  h3 {
    font-size: 20px;
    margin: 15px 0 10px 0;
  }
  
  button {
    background: linear-gradient(135deg, #0a5a0a 0%, #0a3a0a 100%);
    color: #0f0;
    border: 1px solid #0f0;
    padding: 8px 16px;
    margin: 4px 6px;
    cursor: pointer;
    border-radius: 6px;
    font-family: inherit;
    font-weight: bold;
    transition: all 0.3s ease;
    box-shadow: 0 2px 5px rgba(0,255,0,0.2);
  }
  
  button:hover {
    background: linear-gradient(135deg, #0f0 0%, #0a8a0a 100%);
    color: #000;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,255,0,0.4);
  }
  
  button.danger {
    background: linear-gradient(135deg, #8a0a0a 0%, #5a0a0a 100%);
    border-color: #f00;
    color: #faa;
  }
  
  button.danger:hover {
    background: linear-gradient(135deg, #f00 0%, #a00 100%);
    color: #fff;
  }
  
  button.warning {
    background: linear-gradient(135deg, #8a6a0a 0%, #5a3a0a 100%);
    border-color: #ff0;
    color: #ff0;
  }
  
  button.success {
    background: linear-gradient(135deg, #0a8a0a 0%, #0a5a0a 100%);
    border-color: #0f0;
  }
  
  input, select, textarea {
    background: #0a1a0a;
    color: #0f0;
    border: 1px solid #0f0;
    padding: 8px 12px;
    margin: 4px 6px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
  }
  
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #0f0;
    box-shadow: 0 0 10px rgba(0,255,0,0.3);
  }
  
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 15px 0;
    background: #0a0f0a;
    border-radius: 8px;
    overflow: hidden;
  }
  
  th, td {
    border: 1px solid #0f0;
    padding: 10px 8px;
    text-align: left;
  }
  
  th {
    background: linear-gradient(135deg, #0a3a0a 0%, #0a2a0a 100%);
    color: #0f0;
    font-weight: bold;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 1px;
  }
  
  tr:hover {
    background: rgba(0, 255, 0, 0.1);
  }
  
  #login {
    text-align: center;
    padding: 60px 30px;
    background: rgba(0, 20, 0, 0.95);
    border: 2px solid #0f0;
    border-radius: 20px;
    margin: 80px auto;
    max-width: 450px;
    box-shadow: 0 0 50px rgba(0,255,0,0.2);
  }
  
  #login input {
    width: 80%;
    font-size: 18px;
    padding: 12px;
    text-align: center;
  }
  
  #content {
    display: none;
    max-width: 1400px;
    margin: 0 auto;
  }
  
  #error {
    color: #f44;
    margin-top: 15px;
    font-weight: bold;
  }
  
  .section {
    margin: 25px 0;
    padding: 20px;
    border: 1px solid #0f0;
    border-radius: 12px;
    background: rgba(0, 20, 0, 0.3);
    backdrop-filter: blur(5px);
  }
  
  .log-box {
    max-height: 300px;
    overflow-y: auto;
    background: #0a0f0a;
    padding: 12px;
    border: 1px solid #0f0;
    border-radius: 8px;
    margin-top: 12px;
  }
  
  .log-entry {
    margin: 6px 0;
    padding: 6px 10px;
    border-bottom: 1px dashed #0a6a0a;
    font-size: 12px;
  }
  
  .log-entry:hover {
    background: rgba(0, 255, 0, 0.1);
  }
  
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin: 15px 0;
  }
  
  .stat-card {
    background: rgba(0, 30, 0, 0.8);
    border: 1px solid #0f0;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
  }
  
  .stat-number {
    font-size: 32px;
    font-weight: bold;
    color: #0f0;
    text-shadow: 0 0 10px #0f0;
  }
  
  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: bold;
    margin: 2px;
  }
  
  .badge-gold { background: #ffd700; color: #000; }
  .badge-vip { background: #ff00ff; color: #fff; }
  .badge-crown { background: #ffa500; color: #000; }
  
  .control-group {
    display: inline-block;
    margin: 5px;
  }
  
  pre {
    background: #0a0f0a;
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 12px;
    border: 1px solid #0f0;
  }
  
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  
  .online {
    color: #0f0;
    animation: blink 1s infinite;
  }
  
  .offline {
    color: #f00;
  }
</style>
</head>
<body>

<div id="login">
  <h2>🔐 АДМІН-ПАНЕЛЬ UKRMOVA PRO BOT</h2>
  <input type="password" id="pass" placeholder="Введіть пароль адміністратора" autocomplete="off">
  <br><br>
  <button onclick="login()">🚪 УВІЙТИ</button>
  <div id="error"></div>
</div>

<div id="content">

<h1>🤖 UKRMOVA PRO BOT — АДМІН-ПАНЕЛЬ</h1>

<div class="section">
  <h3>📊 СТАТИСТИКА СЕРВЕРУ</h3>
  <div id="stats" class="stats-grid"></div>
  <button onclick="loadStats()" class="success">🔄 Оновити статистику</button>
</div>

<div class="section">
  <h3>👥 УПРАВЛІННЯ ГРАВЦЯМИ</h3>
  <div style="margin-bottom: 15px;">
    <input type="text" id="searchNick" placeholder="🔍 Пошук за нікнеймом" onkeyup="filterPlayers()">
    <button onclick="loadPlayers()" class="success">📋 Оновити список</button>
    <button onclick="showAddPlayerForm()" class="success">➕ Додати гравця</button>
    <button onclick="exportPlayersData()" class="warning">💾 Експорт гравців</button>
  </div>
  
  <div style="margin: 15px 0; padding: 15px; background: rgba(0,30,0,0.5); border-radius: 8px;">
    <strong>🎮 Дії з гравцем:</strong><br>
    <input type="text" id="nick" placeholder="Нікнейм гравця" style="width: 200px;">
    <button onclick="addMoney()">💰 + Гроші</button>
    <button onclick="subMoney()">💰 - Гроші</button>
    <button onclick="setLevel()">⭐ Змінити рівень</button>
    <button onclick="resetPlayer()" class="warning">🔄 Скинути прогрес</button>
    <button onclick="delUser()" class="danger">🗑️ Видалити</button>
    <button onclick="giveAchievement()">🏆 Додати досягнення</button>
    <button onclick="sendMessageToPlayer()">📨 Надіслати повідомлення</button>
  </div>
  
  <div id="players" style="margin-top: 15px; overflow-x: auto;"></div>
</div>

<div class="section">
  <h3>📝 ЛОГИ ВХОДІВ (Telegram)</h3>
  <div style="margin-bottom: 10px;">
    <button onclick="loadLogs()" class="success">🔄 Оновити</button>
    <button onclick="clearLogs()" class="danger">🗑️ Очистити всі логи</button>
    <button onclick="exportLogs()" class="warning">💾 Експортувати логи</button>
    <input type="text" id="filterLogs" placeholder="🔍 Фільтр за ніком" style="width: 200px;" onkeyup="filterLogs()">
  </div>
  <div id="logs" class="log-box"></div>
</div>

<div class="section">
  <h3>⚙️ АКТИВНІСТЬ АДМІНІВ</h3>
  <button onclick="loadAdminLogs()" class="success">🔄 Оновити</button>
  <button onclick="clearAdminLogs()" class="danger">🗑️ Очистити</button>
  <div id="adminLogs" class="log-box"></div>
</div>

<div class="section">
  <h3>🎮 ІГРОВА ЕКОНОМІКА</h3>
  <div class="control-group">
    <button onclick="resetAllPlayers()" class="danger">⚠️ СКИНУТИ ВСІХ ГРАВЦІВ</button>
    <button onclick="giveAllPlayersBonus()" class="success">🎁 БОНУС ВСІМ ГРАВЦЯМ</button>
    <button onclick="setGameSettings()">⚙️ Налаштування гри</button>
  </div>
  <div id="gameSettings" style="margin-top: 15px;"></div>
</div>

<div class="section">
  <h3>📤 ІМПОРТ/ЕКСПОРТ</h3>
  <button onclick="exportFullDatabase()" class="warning">💾 Експорт повної БД (JSON)</button>
  <button onclick="showImportForm()">📥 Імпорт даних</button>
  <div id="importArea" style="display: none; margin-top: 15px;">
    <textarea id="importData" rows="5" cols="50" placeholder="Вставте JSON дані для імпорту..."></textarea>
    <button onclick="importData()">Імпортувати</button>
  </div>
</div>

<div class="section">
  <button onclick="logout()" class="danger" style="float: right;">🚪 ВИЙТИ</button>
  <div style="clear: both;"></div>
</div>

<div id="output" style="margin-top: 20px; background: rgba(0,20,0,0.8); padding: 12px; border: 1px solid #0f0; border-radius: 8px;">
  <pre id="consoleOutput">✅ Система готова...</pre>
</div>

</div>

<script>
const DB = "https://ukrmova-game-default-rtdb.europe-west1.firebasedatabase.app/";
const PASSWORD = "228ff";
let interval = null;
let allPlayers = [];

function login() {
  const input = document.getElementById("pass").value.trim();
  if (input === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("content").style.display = "block";
    document.getElementById("error").textContent = "";
    startAutoUpdate();
    loadPlayers();
    loadLogs();
    loadStats();
    loadAdminLogs();
    logAdminAction("Увійшов в адмін-панель");
    addConsoleMessage("✅ Успішний вхід в адмін-панель");
  } else {
    document.getElementById("error").textContent = "❌ Неправильний пароль!";
    addConsoleMessage("❌ Невдала спроба входу", "error");
  }
}

function logout() {
  if (confirm("Ви впевнені, що хочете вийти?")) {
    clearInterval(interval);
    document.getElementById("content").style.display = "none";
    document.getElementById("login").style.display = "block";
    document.getElementById("pass").value = "";
    logAdminAction("Вийшов з адмін-панелі");
    addConsoleMessage("👋 Вихід з адмін-панелі");
  }
}

function startAutoUpdate() {
  if (interval) clearInterval(interval);
  interval = setInterval(() => {
    loadPlayers();
    loadLogs();
    loadStats();
  }, 15000);
}

async function get(path) {
  try {
    const r = await fetch(DB + path + ".json");
    return await r.json() || {};
  } catch (e) {
    addConsoleMessage(`❌ Помилка запиту: ${e.message}`, "error");
    return {};
  }
}

async function put(path, data) {
  await fetch(DB + path + ".json", {
    method: "PUT",
    body: JSON.stringify(data)
  });
}

async function del(path) {
  await fetch(DB + path + ".json", { method: "DELETE" });
}

async function loadPlayers() {
  const users = await get("users");
  allPlayers = users;
  const container = document.getElementById("players");
  const searchTerm = document.getElementById("searchNick")?.value.toLowerCase() || "";

  if (!Object.keys(users).length) {
    container.innerHTML = "<pre>📭 Гравців немає</pre>";
    return;
  }

  let filtered = users;
  if (searchTerm) {
    filtered = {};
    for (let key in users) {
      if (users[key].name?.toLowerCase().includes(searchTerm) || key.toLowerCase().includes(searchTerm)) {
        filtered[key] = users[key];
      }
    }
  }

  let html = `<table>
    <thead>
      <tr>
        <th>Нікнейм</th>
        <th>💰 Гроші</th>
        <th>⭐ Рівень</th>
        <th>🏆 Досягнення</th>
        <th>📊 Ігор зіграно</th>
        <th>🎯 Точність</th>
        <th>📅 Реєстрація</th>
      </tr>
    </thead>
    <tbody>`;
  
  for (let key in filtered) {
    const u = filtered[key];
    const totalAnswers = (u.totalCorrect || 0) + (u.totalWrong || 0);
    const accuracy = totalAnswers > 0 ? Math.round((u.totalCorrect / totalAnswers) * 100) : 0;
    const achievements = [];
    if (u.items?.vip) achievements.push('<span class="badge badge-vip">VIP</span>');
    if (u.items?.gold_frame) achievements.push('<span class="badge badge-gold">🏅</span>');
    if (u.items?.crown) achievements.push('<span class="badge badge-crown">👑</span>');
    
    html += `  
      <tr>
        <td><strong>${u.name || key}</strong></td>
        <td>${(u.points || 0).toLocaleString()} ₴</td>
        <td>${u.lvl || 1}</td>
        <td>${achievements.join(' ') || '—'}</td>
        <td>${u.themeAttempts ? Object.keys(u.themeAttempts).length : 0}</td>
        <td>${accuracy}%</td>
        <td><small>${u.registeredAt ? new Date(u.registeredAt).toLocaleDateString('uk-UA') : '—'}</small></td>
      </tr>
    `;
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

function filterPlayers() {
  loadPlayers();
}

async function delUser() {
  const nick = document.getElementById("nick").value.trim();
  if (!nick) return alert("❌ Введіть нікнейм");
  if (!confirm(`⚠️ Ви дійсно хочете видалити гравця ${nick}? Цю дію НЕ можна скасувати!`)) return;
  await del(`users/${nick}`);
  loadPlayers();
  logAdminAction(`Видалив гравця: ${nick}`);
  addConsoleMessage(`🗑️ Видалено гравця: ${nick}`);
}

async function addMoney() {
  const nick = document.getElementById("nick").value.trim();
  if (!nick) return alert("Введіть нік");
  const amt = Number(prompt("💰 Скільки додати?"));
  if (!amt || amt <= 0) return;
  const user = await get(`users/${nick}`);
  if (!user.name) return alert("❌ Гравця не знайдено");
  user.points = (user.points || 0) + amt;
  await put(`users/${nick}`, user);
  loadPlayers();
  logAdminAction(`Додав ${amt} ₴ гравцю ${nick}`);
  addConsoleMessage(`💰 +${amt} ₴ гравцю ${nick}`);
}

async function subMoney() {
  const nick = document.getElementById("nick").value.trim();
  if (!nick) return alert("Введіть нік");
  const amt = Number(prompt("💸 Скільки відняти?"));
  if (!amt || amt <= 0) return;
  const user = await get(`users/${nick}`);
  if (!user.name) return alert("❌ Гравця не знайдено");
  user.points = Math.max(0, (user.points || 0) - amt);
  await put(`users/${nick}`, user);
  loadPlayers();
  logAdminAction(`Відняв ${amt} ₴ у гравця ${nick}`);
  addConsoleMessage(`💸 -${amt} ₴ у гравця ${nick}`);
}

async function setLevel() {
  const nick = document.getElementById("nick").value.trim();
  if (!nick) return alert("Введіть нік");
  const lvl = Number(prompt("⭐ Новий рівень (1–100):"));
  if (isNaN(lvl) || lvl < 1 || lvl > 100) return alert("Невірний рівень (1-100)");
  const user = await get(`users/${nick}`);
  if (!user.name) return alert("❌ Гравця не знайдено");
  user.lvl = lvl;
  await put(`users/${nick}`, user);
  loadPlayers();
  logAdminAction(`Змінив рівень гравця ${nick} → ${lvl}`);
  addConsoleMessage(`⭐ Рівень ${nick} → ${lvl}`);
}

async function resetPlayer() {
  const nick = document.getElementById("nick").value.trim();
  if (!nick) return alert("Введіть нік");
  if (!confirm(`⚠️ Скинути весь прогрес гравця ${nick}?`)) return;
  const user = await get(`users/${nick}`);
  if (!user.name) return alert("❌ Гравця не знайдено");
  user.points = 0;
  user.totalCorrect = 0;
  user.totalWrong = 0;
  user.themeAttempts = {};
  user.lvl = 1;
  await put(`users/${nick}`, user);
  loadPlayers();
  logAdminAction(`Скинув прогрес гравця ${nick}`);
  addConsoleMessage(`🔄 Скинуто прогрес гравця ${nick}`);
}

async function giveAchievement() {
  const nick = document.getElementById("nick").value.trim();
  if (!nick) return alert("Введіть нік");
  const achievement = prompt("🏆 Яке досягнення додати? (vip/gold_frame/crown/fire/shield)");
  if (!achievement) return;
  const user = await get(`users/${nick}`);
  if (!user.name) return alert("❌ Гравця не знайдено");
  if (!user.items) user.items = {};
  user.items[achievement] = true;
  await put(`users/${nick}`, user);
  loadPlayers();
  logAdminAction(`Додав досягнення ${achievement} гравцю ${nick}`);
  addConsoleMessage(`🏆 +${achievement} для ${nick}`);
}

async function giveAllPlayersBonus() {
  const amount = Number(prompt("🎁 Скільки грошей видати ВСІМ гравцям?"));
  if (!amount || amount <= 0) return;
  if (!confirm(`Видати ${amount} ₴ ВСІМ гравцям?`)) return;
  const users = await get("users");
  let count = 0;
  for (let key in users) {
    users[key].points = (users[key].points || 0) + amount;
    await put(`users/${key}`, users[key]);
    count++;
  }
  loadPlayers();
  logAdminAction(`Видав бонус ${amount} ₴ всім ${count} гравцям`);
  addConsoleMessage(`🎁 Бонус ${amount} ₴ отримали ${count} гравців`);
}

async function resetAllPlayers() {
  if (!confirm("⚠️⚠️⚠️ СКИНУТИ ВСІХ ГРАВЦІВ? Цю дію НЕ можна скасувати! ⚠️⚠️⚠️")) return;
  const users = await get("users");
  let count = 0;
  for (let key in users) {
    users[key].points = 0;
    users[key].totalCorrect = 0;
    users[key].totalWrong = 0;
    users[key].themeAttempts = {};
    users[key].lvl = 1;
    await put(`users/${key}`, users[key]);
    count++;
  }
  loadPlayers();
  logAdminAction(`Скинув всіх ${count} гравців`);
  addConsoleMessage(`⚠️ Скинуто всіх ${count} гравців`);
}

async function loadLogs() {
  const logs = await get("user_logs");
  const container = document.getElementById("logs");
  const filter = document.getElementById("filterLogs")?.value.toLowerCase() || "";

  if (!Object.keys(logs).length) {
    container.innerHTML = "<pre>📭 Логів немає</pre>";
    return;
  }

  let logsArray = Object.values(logs);
  if (filter) {
    logsArray = logsArray.filter(entry => 
      entry.game_nick?.toLowerCase().includes(filter) || 
      entry.tg_username?.toLowerCase().includes(filter)
    );
  }

  logsArray.sort((a,b) => new Date(b.time) - new Date(a.time));

  let html = '';
  logsArray.slice(0, 500).forEach(entry => {
    const tg = entry.tg_username ? `<span class="badge">@${entry.tg_username}</span>` : '<span class="badge">web</span>';
    html += `<div class="log-entry">
      [${entry.time}] ${tg} — <strong>${entry.game_nick || '—'}</strong>
      ${entry.user_id ? `<small>ID: ${entry.user_id}</small>` : ''}
    </div>`;
  });
  container.innerHTML = html;
}

function filterLogs() {
  loadLogs();
}

async function clearLogs() {
  if (!confirm("⚠️ Очистити ВСІ логи входів?")) return;
  await del("user_logs");
  loadLogs();
  logAdminAction("Очистив логи входів");
  addConsoleMessage("🗑️ Логи входів очищено");
}

async function exportLogs() {
  const logs = await get("user_logs");
  const blob = new Blob([JSON.stringify(logs, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `logs_${new Date().toISOString().slice(0,19)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  addConsoleMessage("💾 Логи експортовано");
}

async function loadAdminLogs() {
  const logs = await get("admin_logs");
  const container = document.getElementById("adminLogs");

  if (!Object.keys(logs).length) {
    container.innerHTML = "<pre>📭 Логів адмінів немає</pre>";
    return;
  }

  let html = '';
  Object.values(logs)
    .sort((a,b) => new Date(b.time) - new Date(a.time))
    .slice(0, 200)
    .forEach(entry => {
      html += `<div class="log-entry">
        [${entry.time}] 👤 ${entry.nick || '—'}: ${entry.action}
      </div>`;
    });
  container.innerHTML = html;
}

async function clearAdminLogs() {
  if (!confirm("⚠️ Очистити логи активності адмінів?")) return;
  await del("admin_logs");
  loadAdminLogs();
  addConsoleMessage("🗑️ Логи адмінів очищено");
}

async function loadStats() {
  const users = await get("users");
  const logs = await get("user_logs");
  const adminLogs = await get("admin_logs");
  
  let count = Object.keys(users).length;
  let totalMoney = 0;
  let totalCorrect = 0;
  let totalWrong = 0;
  let playersWithVIP = 0;
  
  for (let k in users) {
    totalMoney += users[k].points || 0;
    totalCorrect += users[k].totalCorrect || 0;
    totalWrong += users[k].totalWrong || 0;
    if (users[k].items?.vip) playersWithVIP++;
  }
  
  const totalAnswers = totalCorrect + totalWrong;
  const avgAccuracy = totalAnswers > 0 ? Math.round((totalCorrect / totalAnswers) * 100) : 0;
  const avgMoney = count ? Math.floor(totalMoney / count) : 0;
  
  document.getElementById("stats").innerHTML = `
    <div class="stat-card">
      <div class="stat-number">${count}</div>
      <div>👥 Всього гравців</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${totalMoney.toLocaleString()} ₴</div>
      <div>💰 Гроші в грі</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${avgMoney.toLocaleString()} ₴</div>
      <div>📊 Середній баланс</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${totalCorrect}</div>
      <div>✅ Правильних відповідей</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${totalWrong}</div>
      <div>❌ Неправильних відповідей</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${avgAccuracy}%</div>
      <div>🎯 Середня точність</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${playersWithVIP}</div>
      <div>💎 VIP гравців</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${logs ? Object.keys(logs).length : 0}</div>
      <div>📝 Всього входів</div>
    </div>
  `;
}

  const data = await get("");
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);

function showImportForm() {
  const area = document.getElementById("importArea");
  area.style.display = area.style.display === "none" ? "block" : "none";
}

async function importData() {
  const dataText = document.getElementById("importData").value;
  if (!dataText) return alert("Вставте JSON дані");
  try {
    const data = JSON.parse(dataText);
    if (!confirm("⚠️ Імпорт перезапише існуючі дані! Продовжити?")) return;
    await put("", data);
    alert("✅ Імпорт виконано!");
    loadPlayers();
    loadStats();
    addConsoleMessage("📥 Виконано імпорт даних");
  } catch(e) {
    alert("❌ Помилка імпорту: " + e.message);
  }
}

async function sendMessageToPlayer() {
  const nick = document.getElementById("nick").value.trim();
  if (!nick) return alert("Введіть нік");
  const message = prompt("📨 Текст повідомлення для гравця:");
  if (!message) return;
  
  const user = await get(`users/${nick}`);
  if (!user.name) return alert("❌ Гравця не знайдено");
  
  if (!user.messages) user.messages = [];
  user.messages.push({
    from: "Адмін",
    text: message,
    time: new Date().toLocaleString("uk-UA"),
    read: false
  });
  await put(`users/${nick}`, user);
  logAdminAction(`Надіслав повідомлення гравцю ${nick}: "${message.substring(0, 50)}"`);
  addConsoleMessage(`📨 Повідомлення надіслано ${nick}`);
  alert("✅ Повідомлення надіслано! Гравець побачить його при наступному вході.");
}

function showAddPlayerForm() {
  const nick = prompt("👤 Введіть нікнейм нового гравця:");
  if (!nick) return;
  const pass = prompt("🔑 Введіть пароль для гравця:");
  if (!pass) return;
  createNewPlayer(nick, pass);
}

async function createNewPlayer(nick, pass) {
  const existing = await get(`users/${nick}`);
  if (existing.name) {
    alert("❌ Гравець з таким ніком вже існує!");
    return;
  }
  const newUser = {
    name: nick,
    pass: pass,
    points: 500,
    lvl: 1,
    items: {},
    themeAttempts: {},
    totalCorrect: 0,
    totalWrong: 0,
    gameHistory: [],
    registeredAt: new Date().toISOString()
  };
  await put(`users/${nick}`, newUser);
  loadPlayers();
  logAdminAction(`Створив нового гравця: ${nick}`);
  addConsoleMessage(`✅ Створено нового гравця: ${nick}`);
}

async function setGameSettings() {
  const newPointsPerQuestion = prompt("🎯 Скільки грошей давати за правильну відповідь? (зараз 100)");
  if (newPointsPerQuestion) {
    await put("settings/points_per_question", Number(newPointsPerQuestion));
  }
  const newPenalty = prompt("💸 Скільки штрафувати за неправильну відповідь? (зараз 30)");
  if (newPenalty) {
    await put("settings/penalty", Number(newPenalty));
  }
  alert("✅ Налаштування збережено!");
  addConsoleMessage("⚙️ Оновлено ігрові налаштування");
}

function logAdminAction(action) {
  const entry = {
    nick: "Адмін",
    action: action,
    time: new Date().toLocaleString("uk-UA", {timeZone: 'Europe/Kyiv'})
  };
  fetch(DB + "admin_logs.json", {
    method: "POST",
    body: JSON.stringify(entry)
  });
}

function addConsoleMessage(msg, type = "info") {
  const consoleDiv = document.getElementById("consoleOutput");
  const time = new Date().toLocaleTimeString("uk-UA");
  const colors = {
    info: "#0f0",
    error: "#f44",
    warning: "#ff0"
  };
  consoleDiv.innerHTML = `<span style="color: ${colors[type]}">[${time}] ${msg}</span>\n` + consoleDiv.innerHTML;
  if (consoleDiv.children.length > 50) {
    consoleDiv.removeChild(consoleDiv.lastChild);
  }
}

// Ініціалізація
addConsoleMessage("🟢 Адмін-панель завантажена");

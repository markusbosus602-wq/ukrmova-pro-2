<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UkrMova Pro</title>

<style>
:root{--blue:#00a2ff;--red:#ff4d4d;--green:#2ecc71;--gold:#f1c40f}

body{margin:0;background:#111;color:#fff;font-family:sans-serif}
.screen{display:none;padding:20px}
.card{background:#fff;color:#000;padding:20px;border-radius:15px;max-width:350px;margin:auto}
.btn{padding:12px;margin:5px;border:none;border-radius:10px;background:var(--blue);color:#fff;cursor:pointer}
.money{color:var(--gold);font-size:26px}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth-screen" class="screen" style="display:block">
<div class="card">
<h2>UkrMova Pro</h2>
<input id="nick" placeholder="Нік">
<input id="pass" type="password" placeholder="Пароль">
<button class="btn" onclick="auth()">Увійти</button>
<p id="auth-error"></p>
</div>
</div>

<!-- MENU -->
<div id="menu" class="screen">
<div class="card">
<h2 id="playerNick"></h2>
<div class="money" id="mon"></div>

<button class="btn" onclick="show('sections')">Завдання</button>
<button class="btn" onclick="openCabinet()">Мій кабінет</button>
</div>
</div>

<!-- SECTIONS -->
<div id="sections" class="screen">
<div class="card">
<h3>Обери тему</h3>
<button class="btn" onclick="startTheme('vydminy')">Відміни</button>
<button class="btn" onclick="startTheme('frazeologizmy1')">Фразеологізми</button>
<button class="btn" onclick="show('menu')">Назад</button>
</div>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div class="card">
<h3 id="qtext"></h3>
<div id="feedback"></div>
<div id="abox"></div>
<button class="btn" onclick="show('sections')">Назад</button>
</div>
</div>

<!-- CABINET -->
<div id="cabinet" class="screen">
<div class="card">
<h2>Мій кабінет</h2>

<div>Нік: <b id="cab-nick"></b></div>
<div>Гроші: <b id="cab-money"></b></div>

<button class="btn" onclick="logout()">Вийти</button>

<h3>Зміна ніку</h3>
<input id="newNick" placeholder="Новий нік">
<button class="btn" onclick="changeNick()">Змінити</button>

<h3>Зміна пароля</h3>
<input id="newPass" type="password">
<button class="btn" onclick="changePass()">Змінити</button>

<h3>Ідеї</h3>
<div id="ideas"></div>
<button class="btn" onclick="addIdea()">+ Ідея</button>

<button class="btn" onclick="show('menu')">Назад</button>
</div>
</div>

<script>
const DB = "https://ukrmova-game-default-rtdb.europe-west1.firebasedatabase.app/";

let user=null;
let currentTheme='';
let currentIndex=0;
let correctCount=0;
let wrongCount=0;

const themes={
  vydminy:[
    {q:"До якої відміни належить слово «книга»?",a:"перша відміна",w:["друга","третя"]},
    {q:"До якої відміни «стіл»?",a:"друга відміна",w:["перша","третя"]}
  ],
  frazeologizmy1:[
    {q:"Бити байдики?",a:"ледачити",w:["працювати","бігати"]}
  ]
};

function show(id){
document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
}

async function auth(){
let n=nick.value;
let p=pass.value;

let r=await fetch(DB+"users/"+n+".json");
let d=await r.json();

if(d){
if(d.pass!==p) return alert("Пароль неправильний");
user=d;
}else{
user={name:n,pass:p,points:0};
await fetch(DB+"users/"+n+".json",{method:'PUT',body:JSON.stringify(user)});
}

update();
show('menu');
}

function update(){
mon.innerText=user.points;
playerNick.innerText=user.name;
}

function startTheme(t){
currentTheme=t;
currentIndex=0;
correctCount=0;
wrongCount=0;
show('game');
loadQuestion();
}

function loadQuestion(){
let qs=themes[currentTheme];
if(currentIndex>=qs.length){
qtext.innerText="Кінець!";
return;
}

let q=qs[currentIndex];
qtext.innerText=q.q;

abox.innerHTML='';
let arr=[q.a,...q.w].sort(()=>Math.random()-0.5);

arr.forEach(a=>{
let b=document.createElement('button');
b.className='btn';
b.innerText=a;
b.onclick=()=>checkAnswer(a,q.a);
abox.appendChild(b);
});
}

function checkAnswer(s,c){
if(s===c){
user.points+=100;
}else{
user.points=Math.max(0,user.points-30);
}
save();
update();
currentIndex++;
loadQuestion();
}

function save(){
fetch(DB+"users/"+user.name+".json",{method:'PUT',body:JSON.stringify(user)});
}

/* ===== КАБІНЕТ ===== */

let ideas=[];

function openCabinet(){
cab-nick.innerText=user.name;
cab-money.innerText=user.points;
renderIdeas();
show('cabinet');
}

function logout(){
localStorage.clear();
location.reload();
}

async function changeNick(){
let newNick=document.getElementById('newNick').value;
if(!newNick) return;

let old=user.name;

let r=await fetch(DB+"users/"+old+".json");
let d=await r.json();

await fetch(DB+"users/"+newNick+".json",{method:'PUT',body:JSON.stringify(d)});
await fetch(DB+"users/"+old+".json",{method:'DELETE'});

user.name=newNick;
update();
alert("Нік змінено");
}

async function changePass(){
let p=document.getElementById('newPass').value;
if(!p) return;

user.pass=p;
save();
alert("Пароль змінено");
}

function addIdea(){
let t=prompt("Ідея:");
if(!t) return;
ideas.push(t);
renderIdeas();
}

function renderIdeas(){
let div=document.getElementById('ideas');
div.innerHTML='';
ideas.forEach(i=>{
let d=document.createElement('div');
d.innerText="• "+i;
div.appendChild(d);
});
}
</script>

</body>
</html>
